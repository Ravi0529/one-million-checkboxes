services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    deploy:
      replicas: 3
    ports:
      - "8000-8002:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
    volumes:
      - ..:/app
    command: npm run dev

  redis:
    image: redis:7-alpine
    container_name: checkbox_redis
    ports:
      - "6379:6379"
